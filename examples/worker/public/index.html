<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sekant Intercept Scanner</title>
		<style>
			body {
				font-family:
					system-ui,
					-apple-system,
					sans-serif;
				max-width: 1200px;
				margin: 2rem auto;
				padding: 0 1rem;
				line-height: 1.5;
			}
			.container {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 2rem;
				align-items: start;
			}
			@media (max-width: 768px) {
				.container {
					grid-template-columns: 1fr;
				}
			}
			textarea {
				width: 100%;
				min-height: 150px;
				margin: 1rem 0;
				font-family: monospace;
				padding: 0.5rem;
				border: 1px solid #ccc;
				border-radius: 4px;
				font-size: 14px;
				box-sizing: border-box;
			}
			pre {
				background: #f4f4f4;
				padding: 1rem;
				border-radius: 4px;
				overflow-x: auto;
				white-space: pre-wrap;
				font-family: monospace;
				max-height: 600px;
				overflow-y: auto;
			}
			button {
				padding: 0.5rem 1rem;
				cursor: pointer;
				background: #0070f3;
				color: white;
				border: none;
				border-radius: 4px;
				font-size: 1rem;
			}
			button:hover {
				background: #0051a2;
			}
			.section {
				margin-bottom: 2rem;
			}
			h2 {
				margin-top: 0;
				border-bottom: 1px solid #eee;
				padding-bottom: 0.5rem;
			}

			details {
				margin-bottom: 2rem;
				border: 1px solid #eaeaea;
				border-radius: 8px;
				overflow: hidden;
			}
			details summary {
				padding: 1rem;
				cursor: pointer;
				background-color: #f9f9f9;
				font-weight: bold;
				list-style: none; /* Hide default triangle in some browsers */
				display: flex;
				align-items: center;
				justify-content: space-between;
			}
			details summary::-webkit-details-marker {
				display: none;
			}
			details summary::after {
				content: '+';
				font-size: 1.5rem;
				line-height: 1;
			}
			details[open] summary::after {
				content: '-';
			}
			details[open] summary {
				border-bottom: 1px solid #eaeaea;
			}
			details .content {
				padding: 1rem;
			}
			/* Override the pre margin inside details if needed */
			details pre {
				margin: 0;
				border-radius: 0;
			}

			.string {
				color: green;
			}
			.number {
				color: darkorange;
			}
			.boolean {
				color: blue;
			}
			.null {
				color: magenta;
			}
			.key {
				color: red;
			}
		</style>
	</head>
	<body>
		<h1>Sekant Intercept.js Scanner in Cloudflare Worker</h1>

		<div class="container">
			<div class="left-panel">
				<div class="section">
					<h2>Scan Content</h2>
					<p>Enter text to scan against the rules above:</p>
					<textarea id="scan-input" placeholder="Type or paste content here..."></textarea>
					<br />
					<button id="scan-button" type="button">Run Scan</button>
				</div>

				<details open>
					<summary>Current Rules</summary>
					<div class="content">
						<pre id="rules-display">Loading rules...</pre>
					</div>
				</details>
			</div>

			<div class="right-panel">
				<div class="section" id="results-section" style="display: none">
					<h2>Scan Results</h2>
					<pre id="scan-results"></pre>
				</div>
			</div>
		</div>

		<script>
			// Fetch and display rules on load
			fetch('/rules')
				.then((resp) => {
					if (!resp.ok) throw new Error('Failed to fetch rules');
					return resp.text();
				})
				.then((text) => {
					document.getElementById('rules-display').textContent = text;
				})
				.catch((err) => {
					document.getElementById('rules-display').textContent = 'Error loading rules: ' + err.message;
				});

			const scanButton = document.getElementById('scan-button');
			const scanInput = document.getElementById('scan-input');
			const resultsSection = document.getElementById('results-section');
			const scanResults = document.getElementById('scan-results');

			scanButton.addEventListener('click', async () => {
				const content = scanInput.value;
				if (!content) {
					alert('Please enter some text to scan.');
					return;
				}

				scanButton.disabled = true;
				const originalText = scanButton.textContent;
				scanButton.textContent = 'Scanning...';
				resultsSection.style.display = 'block';
				scanResults.textContent = 'Scanning...';

				try {
					const resp = await fetch('/scan', {
						method: 'POST',
						body: content,
					});

					if (resp.ok) {
						let data;
						try {
							data = await resp.json();
						} catch (e) {
							data = { error: 'Failed to parse JSON response' };
						}
						// Helper to highlight JSON syntax
						scanResults.innerHTML = syntaxHighlight(data);
					} else {
						scanResults.textContent = 'Error: ' + resp.status + ' ' + resp.statusText;
					}
				} catch (err) {
					scanResults.textContent = 'Fetch error: ' + err.message;
				} finally {
					scanButton.disabled = false;
					scanButton.textContent = originalText;
				}
			});

			function syntaxHighlight(json) {
				if (typeof json !== 'string') {
					json = JSON.stringify(json, undefined, 2);
				}
				json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
				return json.replace(
					/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
					function (match) {
						let cls = 'number';
						if (/^"/.test(match)) {
							if (/:$/.test(match)) {
								cls = 'key';
							} else {
								cls = 'string';
							}
						} else if (/true|false/.test(match)) {
							cls = 'boolean';
						} else if (/null/.test(match)) {
							cls = 'null';
						}
						return '<span class="' + cls + '">' + match + '</span>';
					},
				);
			}
		</script>
	</body>
</html>
